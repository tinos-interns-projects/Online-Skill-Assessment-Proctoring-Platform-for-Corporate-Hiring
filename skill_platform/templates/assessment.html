<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Skill Assessment</title>
</head>

<body>

{% if error %}
<p style="color:red;font-weight:bold;">
{{ error }}
</p>
{% endif %}

<h2>Online Skill Assessment</h2>

<h3>Time Remaining: <span id="timer">Loading...</span></h3>

<form method="post" id="examForm">

{% csrf_token %}

<input type="hidden" id="endTime" value="{{ test.scheduled_end|date:'c' }}">

{% for question in questions %}

<p>
<strong>{{ forloop.counter }}. {{ question.question_text }}</strong>
</p>

<label>
<input type="radio" name="q{{ question.id }}" value="a">
{{ question.option_a }}
</label><br>

<label>
<input type="radio" name="q{{ question.id }}" value="b">
{{ question.option_b }}
</label><br>

<label>
<input type="radio" name="q{{ question.id }}" value="c">
{{ question.option_c }}
</label><br>

<label>
<input type="radio" name="q{{ question.id }}" value="d">
{{ question.option_d }}
</label><br>

<hr>

{% endfor %}

<button type="submit">Submit Test</button>

</form>

<script>

let endTimeString = document.getElementById("endTime").value;
let endTime = new Date(endTimeString).getTime();

let display = document.getElementById("timer");

function startTimer() {

let interval = setInterval(function () {

let now = new Date().getTime();

let remaining = endTime - now;

if (remaining <= 0) {

clearInterval(interval);

display.textContent = "00:00";

alert("Time is up! Submitting your test.");

document.getElementById("examForm").submit();

return;

}

let minutes = Math.floor((remaining / 1000) / 60);
let seconds = Math.floor((remaining / 1000) % 60);

minutes = minutes < 10 ? "0" + minutes : minutes;
seconds = seconds < 10 ? "0" + seconds : seconds;

display.textContent = minutes + ":" + seconds;

}, 1000);

}

window.onload = startTimer;

</script>

</body>
</html>
